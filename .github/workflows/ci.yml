name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  pipeline:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm run install:deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Deploy
        run: npm run deploy
        env:
          GG_API_TOKEN: ${{ secrets.GG_API_TOKEN }}
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_REMOTE_DIR: ${{ secrets.CPANEL_REMOTE_DIR }}
