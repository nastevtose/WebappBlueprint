name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  python:
    name: Python API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db

  pipeline:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: python

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: npm run install:deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.webappblueprint.peder.mk

      - name: Generate API requirements
        run: uv export --directory api --no-dev --no-hashes -o api/requirements.txt

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy
        run: npm run deploy
        env:
          GG_API_TOKEN: ${{ secrets.GG_API_TOKEN }}
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_REMOTE_DIR: ${{ secrets.CPANEL_REMOTE_DIR }}
          CPANEL_API_DIR: ${{ secrets.CPANEL_API_DIR }}
          CPANEL_VENV_PATH: ${{ secrets.CPANEL_VENV_PATH }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CORS_ORIGINS: '["https://webappblueprint.peder.mk"]'
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          FRONTEND_URL: https://webappblueprint.peder.mk
